services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: pc_api_prod
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: pc_db_prod
    restart: always
    environment:
      POSTGRES_DB: parental_control_db
      POSTGRES_USER: pc_user
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - db_data_prod:/var/lib/postgresql/data

volumes:
  db_data_prod:
