

services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: pc_api

    env_file:
      - .env.docker

    ports:
      - "3000:3000"

    volumes:
      - ..:/app
      - /app/node_modules

    depends_on:
      - db

    command: npm run start:dev


  db:
    image: postgres:16

    container_name: pc_db

    environment:
      POSTGRES_DB: parental_control_db
      POSTGRES_USER: pc_user
      POSTGRES_PASSWORD: strongpassword

    # ports:
    #   - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data


volumes:
  db_data:
